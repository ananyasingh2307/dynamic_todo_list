<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic To-Do List</title>

    <!-- Linking CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Dynamic To-Do List</h1>

        <!-- Short Description -->
        <p class="description">
            This application allows users to add, edit, delete and track completion
            of daily tasks dynamically.
        </p>

        <!-- Input Section -->
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter a new task">
            <button onclick="addTask()">Add Task</button>
        </div>

        <!-- Task Counter -->
        <p id="taskCounter">Pending: 0 | Completed: 0</p>

        <!-- Task List -->
        <ul id="taskList"></ul>

    </div>

    <!-- Linking JavaScript -->
    <script src="script.js"></script>
</body>
</html>
